<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Registro — No Me Olvides</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:    #F5F0E8;
      --card-bg:    #FFFFFF;
      --input-bg:   #F0EAE0;
      --border:     #E3D9CA;
      --accent:     #A07E59;
      --text-1:     #322C24;
      --text-2:     #5F564A;
      --text-3:     #9A8D7B;
      --rose:       #B0654E;
      --green:      #6E8B5B;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg-deep);color:var(--text-2);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem;}
    .card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;padding:2.5rem;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
    .title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--text-1);margin-bottom:0.5rem;text-align:center;}
    .sub{text-align:center;font-size:0.95rem;margin-bottom:2rem;color:var(--text-3);}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    .full{grid-column:1/-1;}
    .group{display:flex;flex-direction:column;gap:0.5rem;}
    label{font-size:0.85rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;}
    input, select{background:var(--input-bg);border:1px solid var(--border);color:var(--text-1);padding:0.9rem;border-radius:8px;font-family:inherit;font-size:0.95rem;outline:none;transition:all 0.2s;}
    input:focus, select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,215,0,0.2);}
    .btn{background:var(--accent);color:#000;border:none;padding:1rem;border-radius:8px;font-weight:bold;font-size:1rem;cursor:pointer;transition:all 0.2s;width:100%;margin-top:1.5rem;}
    .btn:hover{background:var(--accent);transform:translateY(-2px);}
    .alert{padding:1rem;border-radius:8px;margin-bottom:1.5rem;font-weight:500;display:none;}
    .alert-error{background:rgba(231,76,60,0.1);color:var(--rose);border:1px solid rgba(231,76,60,0.3);}
    .alert-success{background:rgba(46,204,113,0.1);color:var(--green);border:1px solid rgba(46,204,113,0.3);text-align:center;padding:3rem 1rem;}
    .divider { border-top:1px solid var(--border); padding-top:1rem; margin-top:0.5rem; }
  </style>
</head>
<body>

<div class="card" id="card-form">
  <div class="title">Bienvenido a la Fundación</div>
  <div class="sub">Complete sus datos para crear su cuenta de acceso</div>
  <div class="alert alert-error" id="alert-error"></div>
  
  <div class="grid">
    <div class="group"><label>Nombre(s) *</label><input type="text" id="nombre" maxlength="50"></div>
    <div class="group"><label>Primer Apellido *</label><input type="text" id="p_apellido" maxlength="50"></div>
    <div class="group"><label>Segundo Apellido</label><input type="text" id="s_apellido" maxlength="50"></div>
    <div class="group"><label>RFC *</label><input type="text" id="rfc" maxlength="13" placeholder="Con homoclave" oninput="this.value = this.value.toUpperCase()"></div>
    <div class="group full"><label>CURP</label><input type="text" id="curp" maxlength="18" placeholder="18 caracteres" oninput="this.value = this.value.toUpperCase()"></div>
    
    <div class="group full divider"><label style="color:var(--accent)">Domicilio (Catálogo SEPOMEX)</label></div>
    <div class="group">
      <label>Código Postal *</label>
      <input type="text" id="cp" maxlength="5" placeholder="5 dígitos">
    </div>
    <div class="group">
      <label>Colonia / Asentamiento *</label>
      <select id="id_colonia">
        <option value="">Esperando CP...</option>
      </select>
    </div>
    <div class="group"><label>Municipio / Alcaldía</label><input type="text" id="municipio" readonly style="opacity:0.7"></div>
    <div class="group"><label>Entidad Federativa</label><input type="text" id="entidad" readonly style="opacity:0.7"></div>
    <div class="group full"><label>Calle y Número</label><input type="text" id="calle" placeholder="Ej. Av. Reforma 250, Int 3"></div>

    <div class="group full divider"><label style="color:var(--accent)">Datos de Acceso</label></div>
    <div class="group"><label>Correo Electrónico *</label><input type="email" id="correo" placeholder="ejemplo@correo.com"></div>
    <div class="group"><label>Crear Contraseña *</label><input type="password" id="pass" placeholder="Mínimo 6 caracteres"></div>
  </div>
  
  <button class="btn" onclick="registrar()">Registrarme</button>
</div>

<div class="card alert-success" id="card-exito" style="display:none;">
  <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
  <h2 style="color:var(--text-1); margin-bottom:0.5rem;">Registro Exitoso</h2>
  <p style="color:var(--text-2);">Tu cuenta ha sido creada y está <strong>pendiente de verificación</strong>.</p>
  <p style="color:var(--text-3); margin-top:1rem; font-size:0.9rem;">Por favor acude a las oficinas de la fundación con tu identificación oficial para que el Director active tu acceso.</p>
  <button class="btn" onclick="location.href='index.html'" style="margin-top:2rem; background:var(--input-bg); color:var(--text-1);">Ir al inicio de sesión</button>
</div>

<script src="auth.js"></script>
<script>
  function showAlert(msg) {
    const el = document.getElementById('alert-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function limpiarTexto(texto) {
    if (!texto) return texto;
    return texto.toString().trim().replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  document.getElementById('cp').addEventListener('input', async function() {
    const cp = this.value.trim();
    if (cp.length === 5) {
      try {
        const res = await fetch(`${API}/api/sepomex/${cp}`); 
        if (res.ok) {
          const data = await res.json();
          document.getElementById('entidad').value = data.entidad;
          document.getElementById('municipio').value = data.municipio;
          
          const selectColonia = document.getElementById('id_colonia');
          selectColonia.innerHTML = '<option value="">Seleccione su colonia...</option>';
          data.colonias.forEach(col => {
            selectColonia.innerHTML += `<option value="${col.id}">${col.nombre}</option>`;
          });
        } else {
          document.getElementById('id_colonia').innerHTML = '<option value="">CP Inválido</option>';
        }
      } catch(e) { console.error(e); }
    }
  });

  async function registrar() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    
    if (!token) return showAlert('Enlace de registro inválido o incompleto. Solicite un nuevo link al Director.');

    const nombre = limpiarTexto(document.getElementById('nombre').value);
    const p_apellido = limpiarTexto(document.getElementById('p_apellido').value);
    const s_apellido = limpiarTexto(document.getElementById('s_apellido').value);
    const curp = limpiarTexto(document.getElementById('curp').value);
    const rfc = limpiarTexto(document.getElementById('rfc').value);
    const correo = limpiarTexto(document.getElementById('correo').value);
    const pass = document.getElementById('pass').value;

    document.getElementById('alert-error').style.display = 'none';

    if (!nombre || !p_apellido || !rfc || !correo || !pass) {
      return showAlert('Por favor, complete todos los campos marcados con *');
    }
    if (pass.length < 6) {
      return showAlert('La contraseña debe tener al menos 6 caracteres.');
    }
    if (curp && curp.length !== 18) {
      return showAlert('El CURP ingresado no es válido (deben ser 18 caracteres).');
    }
    if (rfc.length < 12 || rfc.length > 13) {
      return showAlert('El RFC ingresado no es válido.');
    }

    const colSelect = document.getElementById('id_colonia');
    const colonia = colSelect.options[colSelect.selectedIndex]?.text || '';
    let direccionCompleta = null;
    const calle = limpiarTexto(document.getElementById('calle').value);
    const cp = limpiarTexto(document.getElementById('cp').value);
    
    if(calle || cp) {
        direccionCompleta = `${calle || ''}, Col. ${colonia !== 'Esperando CP...' && colonia !== 'CP Inválido' ? colonia : ''}, ${document.getElementById('municipio').value}, ${document.getElementById('entidad').value}. CP: ${cp}`.replace(/^[,\s]+|[,\s]+$/g, '');
    }

    const body = {
      token: token,
      nombre: nombre,
      primer_apellido: p_apellido,
      segundo_apellido: s_apellido || null,
      rfc: rfc.toUpperCase(),
      curp: curp ? curp.toUpperCase() : null,
      correo: correo,
      contrasena: pass,
      direccion: direccionCompleta 
    };

    try {
      const res = await fetch(`${API}/api/registro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        document.getElementById('card-form').style.display = 'none';
        document.getElementById('card-exito').style.display = 'block';
      } else {
        const data = await res.json();
        showAlert(data.detail || 'Error al registrar. Verifica si el RFC o Correo ya existen.');
      }
    } catch (e) {
      showAlert('Error de conexión con el servidor.');
    }
  }
</script>
</body>
</html>
