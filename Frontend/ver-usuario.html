<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ver Usuario — No Me Olvides</title>
  
  <link rel="icon" href="data:,">
  
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="btn btn-ghost btn-sm" onclick="history.back()">← Volver</button>
        <span class="topbar-title">Personal / Ver Usuario</span>
      </div>
    </div>
    <div class="page-body">
      <div id="contenido-usuario">Cargando...</div>
    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  requireAuth(); requireDirector();
  document.getElementById('sidebar').innerHTML = renderSidebar('usuarios');
  
  async function cargar() {
    const id = new URLSearchParams(window.location.search).get('id');
    const u = await fetch(`${API}/api/usuarios/${id}`, { headers: authHeaders() }).then(r=>r.json()).catch(()=>null);
    if(!u) { document.getElementById('contenido-usuario').innerHTML = 'Usuario no encontrado'; return; }
    
    document.getElementById('contenido-usuario').innerHTML = `
      <div class="page-header">
        <div><div class="page-title">${u.nombre} ${u.primer_apellido || ''}</div><div class="page-sub">RFC: ${u.rfc || '—'}</div></div>
        <button class="btn btn-primary" onclick="location.href='editar-usuario.html?id=${u.id}'">✏️ Editar</button>
      </div>
      <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <div class="stat-card"><div class="stat-title">Rol</div><div class="stat-value" style="font-size:1.5rem">${u.rol || '—'}</div></div>
        <div class="stat-card"><div class="stat-title">Tipo</div><div class="stat-value" style="font-size:1.5rem">${u.tipo || '—'}</div></div>
        <div class="stat-card"><div class="stat-title">Estado</div><div class="stat-value" style="font-size:1.5rem">${u.estado || '—'}</div></div>
      </div>
    `;
  }
  cargar();
</script>
</body>
</html>
