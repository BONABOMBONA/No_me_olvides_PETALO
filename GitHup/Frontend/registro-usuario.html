<!DOCTYPE html>
<html lang="es">
<head>  
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nuevo Usuario — No Me Olvides</title>
  
  <link rel="icon" href="data:,">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Personal</span>
      <span class="topbar-breadcrumb">/ Nuevo Usuario</span>
    </div>
    <div class="page-body">
      <div class="page-header">
        <div><div class="page-title">Registrar Personal</div><div class="page-sub">Crear nuevo usuario manualmente</div></div>
        <button class="btn btn-ghost" onclick="history.back()">← Volver</button>
      </div>
     
      <div class="card">
        <div class="form-section">
          <div class="form-section-title">Datos Personales</div>
          <div class="form-grid">
            <div class="form-group"><label>Nombre(s) *</label><input id="nombre" type="text" placeholder="Nombre completo"/></div>
            <div class="form-group"><label>Primer Apellido *</label><input id="p_apellido" type="text"/></div>
            <div class="form-group"><label>Segundo Apellido</label><input id="s_apellido" type="text"/></div>
            <div class="form-group"><label>RFC</label><input id="rfc" type="text" maxlength="13"/></div>
            <div class="form-group"><label>CURP</label><input id="curp" type="text" maxlength="18"/></div>
            <div class="form-group"><label>Sexo</label>
              <select id="sexo"><option value="">Seleccionar</option><option>Hombre</option><option>Mujer</option><option>Otro</option></select>
            </div>
            <div class="form-group"><label>Edad</label><input id="edad" type="number" min="18" max="99"/></div>
            <div class="form-group form-full"><label>Dirección</label><input id="direccion" type="text"/></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Datos Laborales</div>
          <div class="form-grid">
            <div class="form-group"><label>Tipo *</label>
              <select id="tipo"><option value="">Seleccionar</option><option value="empleado">Empleado</option><option value="voluntario">Voluntario</option></select>
            </div>
            <div class="form-group"><label>Rol *</label>
              <select id="rol">
                <option value="">Seleccionar</option>
                <option value="director">Director</option>
                <option value="coordinador">Coordinador</option>
                <option value="psicologo">Psicólogo</option>
                <option value="doctor">Doctor</option>
                <option value="abogado">Abogado</option>
                <option value="trabajador_social">Trabajador Social</option>
                <option value="analista">Analista</option>
                <option value="equipo_multidisciplinario">Equipo Multidisciplinario</option>
                <option value="donante">Donante</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Acceso al Sistema</div>
          <div class="form-grid">
            <div class="form-group"><label>Correo Electrónico *</label><input id="correo" type="email"/></div>
            <div class="form-group"><label>Contraseña *</label><input id="contrasena" type="password"/></div>
            <div class="form-group"><label>Estado</label>
              <select id="estado"><option value="activo">Activo</option><option value="pendiente">Pendiente</option><option value="inactivo">Inactivo</option></select>
            </div>
          </div>
        </div>
        
        <div id="alert"></div>
        
        <div style="display:flex;justify-content:flex-end;gap:1rem;margin-top:1rem;">
          <button class="btn btn-ghost" onclick="history.back()">Cancelar</button>
          <button class="btn btn-primary" onclick="registrar()">Registrar Usuario</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  requireAuth(); 
  requireDirector();
  document.getElementById('sidebar').innerHTML = renderSidebar('usuarios');

  async function registrar() {
    const body = {
      nombre: document.getElementById('nombre').value,
      primer_apellido: document.getElementById('p_apellido').value,
      segundo_apellido: document.getElementById('s_apellido').value,
      rfc: document.getElementById('rfc').value,
      curp: document.getElementById('curp').value,
      sexo: document.getElementById('sexo').value,
      edad: parseInt(document.getElementById('edad').value)||null,
      direccion: document.getElementById('direccion').value,
      correo: document.getElementById('correo').value,
      contrasena: document.getElementById('contrasena').value,
      tipo: document.getElementById('tipo').value,
      rol: document.getElementById('rol').value,
      estado: document.getElementById('estado').value,
    };

    if (!body.nombre || !body.primer_apellido || !body.correo || !body.contrasena) {
      showAlert('Completa los campos obligatorios', 'error'); 
      return;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(body.correo)) {
        showAlert('Ingresa un correo electrónico válido (ejemplo@dominio.com).', 'error');
        return;
    }
    
    if (body.edad !== null && (body.edad < 18 || body.edad > 99)) {
        showAlert('La edad debe ser un número entre 18 y 99 años.', 'error');
        return;
    }

    if (body.curp && body.curp.length !== 18) {
        showAlert('El CURP no es válido. Debe tener exactamente 18 caracteres.', 'error');
        return;
    }

    if (body.rfc && body.rfc.length !== 13) {
        showAlert('El RFC no es válido. Debe tener exactamente 13 caracteres.', 'error');
        return;
    }
    
    const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+.\-]).{8,}$/;
    if (!passwordRegex.test(body.contrasena)) {
      showAlert('La contraseña debe tener al menos 8 letras, 1 mayúscula, 1 número y 1 símbolo (!@#$%)', 'error'); 
      return; 
    }

    const res = await fetch(`${API}/api/usuarios`, { 
        method: 'POST', 
        headers: authHeaders(), 
        body: JSON.stringify(body) 
    });
    
    const data = await res.json();
    
    if (res.ok) { 
        showAlert('Usuario registrado exitosamente', 'success'); 
        setTimeout(() => location.href = 'lista-usuarios.html', 1500); 
    }  else { 
        let mensajeTecnico = data.detail || 'Error al registrar';
        let mensajeEspanol = mensajeTecnico; 

        if (mensajeTecnico.includes('personal_curp_key')) {
            mensajeEspanol = 'Ya existe una persona registrada con este CURP.';
        } 
        else if (mensajeTecnico.includes('personal_correo_key')) {
            mensajeEspanol = 'Este correo electrónico ya está registrado en el sistema.';
        }
        else if (mensajeTecnico.includes('personal_rfc_key')) {
            mensajeEspanol = 'Ya existe una persona registrada con este RFC.';
        }

        showAlert(mensajeEspanol, 'error'); 
    }
  }
 
  function limpiarTexto(texto) {
    if (!texto) return texto;
    return texto.toString().replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function showAlert(msg, tipo) {
    document.getElementById('alert').innerHTML = `<div class="alert alert-${tipo === 'error' ? 'error' : 'success'}" style="margin-bottom:1rem;">${msg}</div>`;
  }
</script>
</body>
</html>
