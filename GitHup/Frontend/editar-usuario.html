<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Editar Usuario — No Me Olvides</title>
  
  <link rel="icon" href="data:,">
  
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="btn btn-ghost btn-sm" onclick="history.back()">← Volver</button>
        <span class="topbar-title">Personal / Editar Usuario</span>
      </div>
    </div>
    <div class="page-body">
      <form id="form-editar" onsubmit="guardar(event)">
        <div class="page-header">
          <div><div class="page-title">Editar Perfil</div><div class="page-sub" id="sub-titulo">Cargando datos...</div></div>
          <div style="display:flex;gap:1rem;">
            <button type="button" class="btn btn-secondary" onclick="history.back()">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
          </div>
        </div>

        <div class="table-wrap" style="padding:2rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
          <div class="form-group">
            <label>Nombre(s)</label>
            <input type="text" id="nombre" required>
          </div>
          <div class="form-group">
            <label>Primer Apellido</label>
            <input type="text" id="apellido" required>
          </div>
          <div class="form-group">
            <label>RFC</label>
            <input type="text" id="rfc" readonly style="background:var(--border); opacity:0.7;">
          </div>
          <div class="form-group">
            <select id="rol">
              <option value="director">Director</option>
              <option value="coordinador">Coordinador</option>
              <option value="psicologo">Psicólogo</option>
              <option value="doctor">Doctor</option>
              <option value="abogado">Abogado</option>
              <option value="trabajador_social">Trabajador Social</option>
              <option value="analista">Analista</option>
              <option value="equipo_multidisciplinario">Equipo Multidisciplinario</option>
              <option value="donante">Donante</option>
            </select>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  requireAuth(); requireDirector();
  document.getElementById('sidebar').innerHTML = renderSidebar('usuarios');
  const id = new URLSearchParams(window.location.search).get('id');

  async function cargar() {
    const u = await fetch(`${API}/api/usuarios/${id}`, { headers: authHeaders() }).then(r=>r.json()).catch(()=>null);
    if(!u) return alert('Usuario no encontrado');
    
    document.getElementById('sub-titulo').textContent = `Editando a: ${u.nombre}`;
    document.getElementById('nombre').value = u.nombre;
    document.getElementById('apellido').value = u.primer_apellido;
    document.getElementById('rfc').value = u.rfc || '';
    document.getElementById('rol').value = u.rol;
  }

  async function guardar(e) {
    e.preventDefault();
    const datos = {
      nombre: document.getElementById('nombre').value,
      primer_apellido: document.getElementById('apellido').value,
      rol: document.getElementById('rol').value
    };

    const res = await fetch(`${API}/api/usuarios/${id}`, {
      method: 'PUT',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    });

    if(res.ok) {
      alert('¡Cambios guardados con éxito!');
      location.href = 'lista-usuarios.html';
    } else {
      alert('Error al guardar los cambios');
    }
  }
  cargar();
</script>
</body>
</html>
